<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ron&apos;s Retirement Finance Model Guide</title>
<link rel="icon" href="favicon-bear-20260605.ico?v=20260605" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon-bear-20260605.png?v=20260605">
<style>
:root{--dark:#1a1208;--gold:#c8960c;--gold2:#ffe36d;--cream:#faf7ef;--cream2:#e8e1d1;--ink:#1b1308}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--cream2);color:var(--ink);font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.guide-bar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#201405,#100b04);border-bottom:3px solid var(--gold);box-shadow:0 3px 12px rgba(0,0,0,.22);padding:calc(8px + env(safe-area-inset-top)) 12px 8px;display:flex;align-items:center;gap:10px}
.guide-label{margin-right:auto;color:#b69b60;font:800 12px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guide-btn{appearance:none;border:1px solid var(--gold);background:var(--gold);color:var(--dark);border-radius:8px;padding:10px 14px;font:900 13px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.06em;text-decoration:none;cursor:pointer;white-space:nowrap}
.viewer{flex:1;min-height:0;padding:8px;background:var(--cream2)}
.viewer iframe,.viewer object{display:block;width:100%;height:100%;min-height:calc(100vh - 62px);min-height:calc(100dvh - 62px);border:1px solid #cdbb91;border-radius:8px;background:white;box-shadow:0 5px 16px rgba(0,0,0,.12)}
.fallback{padding:24px;max-width:720px;margin:0 auto;background:white;border:1px solid #d8c9a8;border-radius:8px;font-size:16px;line-height:1.45}.fallback a{color:#765300;font-weight:700}
@media(max-width:680px){.guide-bar{justify-content:flex-end;padding:calc(7px + env(safe-area-inset-top)) 10px 7px}.guide-label{display:none}.guide-btn{padding:9px 12px;font-size:12px}.viewer{padding:4px}.viewer iframe,.viewer object{min-height:calc(100dvh - 54px);border-radius:6px}}
@media print{.guide-bar{display:none}.viewer{padding:0}.viewer iframe,.viewer object{border:0;box-shadow:none}}
</style>
</head>
<body>
<header class="guide-bar" aria-label="Guide controls">
  <div class="guide-label">Guide PDF</div>
  <button class="guide-btn" type="button" onclick="goBackToApp()">Back to app</button>
</header>
<main class="viewer">
  <object data="rons_retirement_guide.pdf#toolbar=1&navpanes=0" type="application/pdf">
    <iframe title="Ron&apos;s Retirement Finance Model Guide" src="rons_retirement_guide.pdf#toolbar=1&navpanes=0">
      <div class="fallback">
        <p>The PDF viewer is not available in this browser view.</p>
        <p><a href="index.html">Return to the app</a></p>
      </div>
    </iframe>
  </object>
</main>
<script>
function goBackToApp(){
  if (document.referrer && !/rons_retirement_guide\.pdf/i.test(document.referrer)) {
    history.back();
    setTimeout(function(){ if (location.pathname.toLowerCase().endsWith('/guide.html')) location.href = 'index.html'; }, 450);
  } else {
    location.href = 'index.html';
  }
}
</script>
</body>
</html>
