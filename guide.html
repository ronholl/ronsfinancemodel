<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ron&apos;s Retirement Finance Model Guide</title>
<link rel="icon" href="favicon-bear-20260605.ico?v=20260605" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon-bear-20260605.png?v=20260605">
<style>
:root{--dark:#1a1208;--gold:#c8960c;--gold2:#ffe36d;--cream:#faf7ef;--cream2:#efe4c8;--ink:#1b1308;--ink2:#4b3718;--green:#1f6b2a}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--cream);color:var(--ink);font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.guide-top{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#201405,#100b04);border-bottom:3px solid var(--gold);box-shadow:0 4px 14px rgba(0,0,0,.28);padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.guide-title{min-width:0}.guide-title h1{margin:0;color:var(--gold2);font-size:18px;line-height:1.05;letter-spacing:.02em}.guide-title p{margin:3px 0 0;color:#b69b60;font:700 11px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase}
.guide-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.guide-btn{appearance:none;border:1px solid var(--gold);background:var(--gold);color:var(--dark);border-radius:6px;padding:8px 11px;font:900 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.06em;text-decoration:none;cursor:pointer;white-space:nowrap}.guide-btn.secondary{background:transparent;color:var(--gold2)}
.guide-note{padding:10px 14px;border-bottom:1px solid var(--cream2);font-size:13px;line-height:1.45;color:var(--ink2);background:#fffdf6}.guide-note strong{color:var(--green)}
.viewer{flex:1;min-height:0;padding:10px;background:#e8e1d1}.viewer iframe,.viewer object{width:100%;height:100%;min-height:calc(100vh - 150px);min-height:calc(100dvh - 150px);border:1px solid #cdbb91;border-radius:8px;background:white;box-shadow:0 6px 18px rgba(0,0,0,.12)}
.fallback{padding:24px;max-width:720px;margin:0 auto;background:white;border:1px solid var(--cream2);border-radius:8px;font-size:16px;line-height:1.45}.fallback a{color:#765300;font-weight:700}
@media(max-width:680px){.guide-top{align-items:flex-start}.guide-title h1{font-size:15px}.guide-title p{font-size:9px}.guide-btn{padding:8px 9px;font-size:10px}.guide-note{font-size:12px}.viewer{padding:6px}.viewer iframe,.viewer object{min-height:calc(100dvh - 142px)}}
@media print{.guide-top,.guide-note{display:none}.viewer{padding:0}.viewer iframe,.viewer object{border:0;box-shadow:none}}
</style>
</head>
<body>
<header class="guide-top">
  <div class="guide-title">
    <h1>Ron&apos;s Retirement Finance Model Guide</h1>
    <p>Plain-English setup and Roth Lab guide</p>
  </div>
  <div class="guide-actions">
    <button class="guide-btn" type="button" onclick="goBackToApp()">Back to app</button>
    <a class="guide-btn secondary" href="rons_retirement_guide.pdf" target="_blank" rel="noopener">Open full PDF</a>
  </div>
</header>
<div class="guide-note"><strong>Tip:</strong> Use <b>Back to app</b> to return from a phone home-screen app. The full PDF link is optional if you want the browser&apos;s native PDF controls.</div>
<main class="viewer">
  <object data="rons_retirement_guide.pdf#toolbar=1&navpanes=0" type="application/pdf">
    <iframe title="Ron&apos;s Retirement Finance Model Guide" src="rons_retirement_guide.pdf#toolbar=1&navpanes=0">
      <div class="fallback">
        <p>The PDF viewer is not available in this browser view.</p>
        <p><a href="rons_retirement_guide.pdf">Open the guide PDF</a> or <a href="index.html">return to the app</a>.</p>
      </div>
    </iframe>
  </object>
</main>
<script>
function goBackToApp(){
  if (document.referrer && !/rons_retirement_guide\.pdf/i.test(document.referrer)) {
    history.back();
    setTimeout(function(){ if (location.pathname.toLowerCase().endsWith('/guide.html')) location.href = 'index.html'; }, 450);
  } else {
    location.href = 'index.html';
  }
}
</script>
</body>
</html>
